<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kadraj yansımaları - Mavi Kadraj</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c1218;
      --text: #e8eef4;
      --text-muted: #8a9bab;
      --accent: #5b8fc7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      margin-left: 1.5rem;
    }
    nav a:hover { color: var(--accent); }
    .page-title {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      padding: 3rem 1rem 2rem;
      color: var(--text-muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
    }
    .tile {
      position: relative;
      aspect-ratio: 3/2;
      overflow: hidden;
      display: block;
      text-decoration: none;
      color: var(--text);
    }
    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease, filter 0.4s;
      filter: brightness(0.92);
    }
    .tile:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }
    .tile .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 1.5rem 1.25rem;
      background: linear-gradient(transparent, rgba(12,18,24,0.92));
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      letter-spacing: 0.06em;
    }
    .video-tile {
      grid-column: 1 / -1;
      aspect-ratio: auto;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 3rem 1.5rem;
      background: rgba(91, 143, 199, 0.06);
      text-decoration: none;
      color: var(--accent);
      font-size: 1rem;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }
    .video-tile:hover { background: rgba(91, 143, 199, 0.12); color: var(--text); }
    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">Mavi Kadraj</a>
    <nav>
      <a href="index.html">Ana sayfa</a>
      <a href="https://www.instagram.com/mavi_kadraj14/" target="_blank" rel="noopener">Instagram</a>
    </nav>
  </header>
  <h1 class="page-title">kadraj yansımaları</h1>
  <div class="grid">
    <a class="tile" href="https://www.mavikadraj.com.tr/hikayedram/" target="_blank" rel="noopener">
      <img src="https://www.mavikadraj.com.tr/wp-content/uploads/2025/12/tepekoy4%E2%9C%A8-1024x683.jpg" alt="Sessizlik" loading="lazy" width="1024" height="683" />
      <span class="label">Sessizlik</span>
    </a>
    <a class="tile" href="https://www.mavikadraj.com.tr/tarihkultur/" target="_blank" rel="noopener">
      <img src="https://www.mavikadraj.com.tr/wp-content/uploads/2025/12/kalekoy3%E2%9C%A8-2048x1365.jpg" alt="Zaman" loading="lazy" width="1024" height="683" />
      <span class="label">Zaman</span>
    </a>
    <a class="tile" href="https://www.mavikadraj.com.tr/sokaksehir/" target="_blank" rel="noopener">
      <img src="https://www.mavikadraj.com.tr/wp-content/uploads/2025/12/tasduvar_gul-768x512.jpg" alt="İnsan İzleri" loading="lazy" width="768" height="512" />
      <span class="label">İnsan İzleri</span>
    </a>
    <a class="tile" href="https://www.mavikadraj.com.tr/doga-can-dostlar/" target="_blank" rel="noopener">
      <img src="https://www.mavikadraj.com.tr/wp-content/uploads/2025/12/cropped-harabe-ev-_mavikadraj.mustafa-scaled-1-1024x682.jpg" alt="Sessiz Yoldaşlar" loading="lazy" width="1024" height="682" />
      <span class="label">Sessiz Yoldaşlar</span>
    </a>
    <a class="video-tile" href="https://www.mavikadraj.com.tr/yasamdan-yansimalar/" target="_blank" rel="noopener">
      Yaşamdan Yansımalar ~ video
    </a>
  </div>
  <footer><a href="index.html" style="color: inherit;">← Ana sayfa</a></footer>
</body>
</html>
