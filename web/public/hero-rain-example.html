<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero + Canvas yağmur (örnek)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 420px;
      overflow: hidden;
    }

    .hero-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("/hero/hero.jpg");
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    #rainCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 1rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .hero-content h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      margin-bottom: 1rem;
      font-family: system-ui, sans-serif;
    }

    .hero-content p {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-background" aria-hidden="true"></div>
    <canvas id="rainCanvas"></canvas>
    <div class="hero-content">
      <h1>Mavi Kadraj</h1>
      <p>sessiz kareler…</p>
    </div>
  </section>

  <script>
    (function () {
      const canvas = document.getElementById("rainCanvas");
      const ctx = canvas.getContext("2d");
      const drops = [];
      const MAX = 24;
      let W, H, dpr, nextSpawn = 0;

      function resize() {
        const hero = canvas.parentElement;
        W = hero.clientWidth;
        H = hero.clientHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function spawn() {
        if (drops.length >= MAX) return;
        const r = 1.4 + Math.random() * 3;
        drops.push({
          x: r * 2 + Math.random() * (W - r * 4),
          y: -20 - Math.random() * 40,
          vy: 8 + Math.random() * 14,
          r,
          op: 0.06 + Math.random() * 0.1,
          phase: Math.random() * 6.28,
        });
      }

      function draw(d) {
        const p = Math.min(d.y / H, 1);
        const spread = 1 + p * 2.2;
        const rx = d.r * spread;
        const ry = d.r * (1.1 + p * 0.9);
        const x = d.x + Math.sin(d.y * 0.02 + d.phase) * 3;
        const y = d.y;

        const g = ctx.createRadialGradient(x, y - ry * 0.2, 0, x, y, ry * 2.2);
        g.addColorStop(0, `rgba(255,255,255,${d.op * 0.6})`);
        g.addColorStop(0.35, `rgba(230,240,255,${d.op * 0.25})`);
        g.addColorStop(1, "rgba(200,220,240,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      let last = performance.now();
      function loop(t) {
        const dt = Math.min((t - last) / 1000, 0.05);
        last = t;
        if (t >= nextSpawn && drops.length < MAX) {
          spawn();
          nextSpawn = t + 400 + Math.random() * 1600;
        }
        ctx.clearRect(0, 0, W, H);
        for (let i = drops.length - 1; i >= 0; i--) {
          const d = drops[i];
          d.y += d.vy * (1 - Math.min(d.y / H, 0.85) * 0.25) * dt;
          if (d.y > H + 20 || d.op < 0.01) {
            drops.splice(i, 1);
            continue;
          }
          if (d.y > H * 0.55) d.op -= dt * 0.15;
          draw(d);
        }
        requestAnimationFrame(loop);
      }

      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
